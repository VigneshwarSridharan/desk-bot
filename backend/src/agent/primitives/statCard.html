<!-- statCard: a single labeled metric with a large value and optional accent color -->
<div class="stat-card" data-prim="statCard">
  <div class="stat-card-label">{{label}}</div>
  <div class="stat-card-value" style="color:{{color}}">{{value}}</div>
</div>
<style>
  .stat-card{background:#161616;border-radius:16px;padding:20px 24px;}
  .stat-card-label{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px}
  .stat-card-value{font-size:40px;font-weight:700;margin-top:8px}
</style>
