<!-- progressBar: a labeled horizontal progress/percentage indicator -->
<div class="progress-bar" data-prim="progressBar">
  <div class="progress-bar-label">{{label}}</div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" style="width:{{percent}}%;background:{{color}}"></div>
  </div>
</div>
<style>
  .progress-bar-label{font-size:16px;color:#ccc;margin-bottom:8px}
  .progress-bar-track{width:100%;height:12px;border-radius:6px;background:#222;overflow:hidden}
  .progress-bar-fill{height:100%;border-radius:6px}
</style>
